<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Link Opener LOL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root { --blue:#4f7cff; --bg:rgba(10,15,40,.92); }

body{
  margin:0;height:100vh;font-family:'Segoe UI',sans-serif;
  background:radial-gradient(circle at top,#0b1d3a,#05070f);
  color:#e0eaff;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

canvas{position:fixed;inset:0;z-index:0}

.panel{
  z-index:1;width:90%;max-width:720px;
  background:var(--bg);
  border:1px solid var(--blue);
  border-radius:18px;padding:26px;
  box-shadow:0 0 35px rgba(80,120,255,.4);
}

h1{text-align:center;color:#8ab4ff;text-shadow:0 0 14px var(--blue)}

textarea{
  width:100%;height:220px;
  background:#070b1e;color:#dbe4ff;
  border:1px solid var(--blue);
  border-radius:12px;padding:14px;resize:none;
}

.buttons{display:flex;gap:12px;margin-top:18px}

button{
  flex:1;padding:12px;font-size:15px;
  border-radius:14px;border:1px solid var(--blue);
  background:linear-gradient(145deg,#1b2fff,#4f7cff);
  color:white;cursor:pointer;
}

#stats{
  margin-top:15px;
  font-size:14px;
  color:#8ab4ff;
}

.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%);
  background:#1b2fff;padding:10px 18px;
  border-radius:12px;animation:fade 2s forwards;
}
@keyframes fade{0%{opacity:0}15%{opacity:1}85%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="panel">
  <h1>⚡ Link Opener LOL</h1>

  <textarea id="urls" placeholder="Paste anything here… links auto-detected"></textarea>

  <div id="stats">
    0 Links detected!<br>
    0 Non-URLs detected!
  </div>

  <div class="buttons">
    <button onclick="openUrls()">🚀 Launch</button>
    <button onclick="copyUrls()">📋 Copy</button>
  </div>
</div>

<input type="file" id="fileInput" hidden>

<script>
const urlsEl = document.getElementById("urls");
const stats = document.getElementById("stats");

/* SAFE REGEX */
const URL_REGEX = /\b((https?:\/\/)?([\w-]+\.)+[a-z]{2,}(\/\S*)?)\b/gi;
const URL_REGEX_TEST = /\b((https?:\/\/)?([\w-]+\.)+[a-z]{2,}(\/\S*)?)\b/i;

/* NORMALIZE */
const normalize = u => /^https?:\/\//i.test(u) ? u : "https://" + u;

/* GET VALID URLS ONLY */
function getUrls(){
  const words = urlsEl.value.trim().split(/\s+/);
  const valid = words.filter(w => URL_REGEX_TEST.test(w)).map(normalize);
  return [...new Set(valid)];
}

/* LIVE DETECTION */
urlsEl.addEventListener("input",()=>{
  const text = urlsEl.value.trim();

  if(!text){
    stats.innerHTML = `0 Links detected!<br>0 Non-URLs detected!`;
    return;
  }

  const words = text.split(/\s+/);
  const valid = words.filter(w => URL_REGEX_TEST.test(w));
  const uniqueLinks = [...new Set(valid.map(normalize))];

  const nonUrls = words.length - valid.length;

  stats.innerHTML = `
    ${uniqueLinks.length} Links detected!<br>
    ${nonUrls} Non-URLs detected!
  `;
});

/* OPEN ONLY VALID LINKS */
function openUrls(){
  const urls = getUrls();

  if(!urls.length){
    toast("No valid links found!");
    return;
  }

  urls.forEach(u => window.open(u, "_blank"));
  toast(`${urls.length} link(s) opened!`);
}

/* COPY ONLY VALID LINKS */
function copyUrls(){
  const urls = getUrls();

  if(!urls.length){
    toast("No valid links to copy!");
    return;
  }

  navigator.clipboard.writeText(urls.join("\n"));
  toast("Copied valid links!");
}

/* TOAST */
function toast(t){
  const d=document.createElement("div");
  d.className="toast";
  d.textContent=t;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),2000);
}

/* FILE LOAD */
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=ev=>urlsEl.value=ev.target.result;
  r.readAsText(e.target.files[0]);
};

/* PARTICLES */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
let w,h,stars=[];

function resize(){
  w=canvas.width=innerWidth;
  h=canvas.height=innerHeight;
  stars=Array.from({length:120},()=>({
    x:Math.random()*w,
    y:Math.random()*h,
    r:Math.random()*2,
    s:Math.random()+0.3
  }));
}

function draw(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="#8ab4ff";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
    s.y+=s.s;
    if(s.y>h){
      s.y=0;
      s.x=Math.random()*w;
    }
  });
  requestAnimationFrame(draw);
}

resize();
draw();
</script>

</body>
</html>
